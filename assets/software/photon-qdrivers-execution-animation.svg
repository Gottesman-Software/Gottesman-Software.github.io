<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Photon-QDrivers animated emulator and hardware execution path</title>
  <desc id="desc">Animated overview showing a validated photonic circuit flowing through emulator adapters and hardware adapters into a normalized photonic result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="52%" stop-color="#eef7ff"/>
      <stop offset="100%" stop-color="#f7fff9"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="emulator" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="hardware" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .title { font: 700 36px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 600 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .panel { stroke: #cbd5e1; stroke-width: 1.25; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #c7d2fe; stroke-width: 1.4; filter: url(#shadow); }
      .emu-node { fill: url(#emulator); stroke: #93c5fd; }
      .hw-node { fill: url(#hardware); stroke: #86efac; }
      .core-node { fill: url(#core); stroke: #a5b4fc; }
      .solid { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
      .flow-blue { stroke: #2563eb; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 10 12; marker-end: url(#arrow-blue); animation: dash 1.7s linear infinite; }
      .flow-green { stroke: #059669; stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 10 12; marker-end: url(#arrow-green); animation: dash 1.7s linear infinite; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; }
      .pulse2 { animation: pulse 2.2s ease-in-out 0.7s infinite; }
      .pulse3 { animation: pulse 2.2s ease-in-out 1.4s infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="680" fill="url(#bg)"/>

  <g transform="translate(0,-78)">
  <rect x="48" y="112" width="448" height="118" rx="8" fill="#ffffff" class="panel"/>
  <text x="72" y="143" class="label">Emulator targets</text>
  <text x="72" y="171" class="small">Perceval, Piquasso, Lightworks, QuTiP</text>
  <text x="72" y="194" class="small">Dynamiqs, The Walrus, Strawberry Fields legacy</text>
  <text x="72" y="216" class="tiny">Simulation, dynamics, sampling, and CI parity.</text>

  <rect x="704" y="112" width="448" height="118" rx="8" fill="#ffffff" class="panel"/>
  <text x="728" y="143" class="label">Hardware targets</text>
  <text x="728" y="171" class="small">Xanadu, Quandela, ORCA Computing, PsiQuantum</text>
  <text x="728" y="194" class="small">PCIe / DMA, Ethernet, USB, vendor SDKs</text>
  <text x="728" y="216" class="tiny">Adapter-dependent control path for real devices and FPGA boards.</text>

  <rect x="452" y="266" width="296" height="58" rx="8" class="node core-node"/>
  <text x="600" y="290" text-anchor="middle" class="label">Python API</text>
  <text x="600" y="310" text-anchor="middle" class="small">from photonic_driver import Driver</text>

  <rect x="452" y="346" width="296" height="58" rx="8" class="node core-node"/>
  <text x="600" y="370" text-anchor="middle" class="label">Validated IR</text>
  <text x="600" y="390" text-anchor="middle" class="small">PhotonicCircuit v1 + capabilities</text>

  <rect x="462" y="436" width="276" height="64" rx="8" class="node core-node"/>
  <text x="600" y="462" text-anchor="middle" class="label">Backend Adapter</text>
  <text x="600" y="483" text-anchor="middle" class="small">compile(circuit) -&gt; run(job)</text>

  <rect x="94" y="500" width="276" height="64" rx="8" class="node emu-node"/>
  <text x="232" y="526" text-anchor="middle" class="label">Emulator Engine</text>
  <text x="232" y="547" text-anchor="middle" class="small">simulate, sample, model noise</text>

  <rect x="94" y="620" width="276" height="64" rx="8" class="node emu-node"/>
  <text x="232" y="646" text-anchor="middle" class="label">Result Normalizer</text>
  <text x="232" y="667" text-anchor="middle" class="small">counts, metadata, status</text>

  <rect x="830" y="500" width="276" height="64" rx="8" class="node hw-node"/>
  <text x="968" y="526" text-anchor="middle" class="label">C++ Runtime + HAL</text>
  <text x="968" y="547" text-anchor="middle" class="small">low-latency job boundary</text>

  <rect x="830" y="620" width="276" height="64" rx="8" class="node hw-node"/>
  <text x="968" y="646" text-anchor="middle" class="label">FPGA Driver + Firmware</text>
  <text x="968" y="667" text-anchor="middle" class="small">pulse, readout, coincidence</text>

  <rect x="462" y="682" width="276" height="58" rx="8" class="node core-node"/>
  <text x="600" y="706" text-anchor="middle" class="label">PhotonicResult</text>
  <text x="600" y="726" text-anchor="middle" class="small">same schema for emulators and hardware</text>

  <path d="M600 324 L600 346" class="solid"/>
  <path d="M600 404 L600 436" class="solid"/>
  <path id="emu-path" d="M462 468 C382 472 310 486 232 500 M232 564 L232 620 M370 652 C430 674 498 694 462 711" class="flow-blue"/>
  <path id="hw-path" d="M738 468 C820 472 900 486 968 500 M968 564 L968 620 M830 652 C760 674 692 694 738 711" class="flow-green"/>

  <circle r="9" fill="#2563eb" filter="url(#glow)">
    <animateMotion dur="4.2s" repeatCount="indefinite" path="M462 468 C382 472 310 486 232 500 L232 620 C338 670 452 700 462 711"/>
  </circle>
  <circle r="9" fill="#059669" filter="url(#glow)">
    <animateMotion dur="4.2s" begin="0.45s" repeatCount="indefinite" path="M738 468 C820 472 900 486 968 500 L968 620 C862 670 748 700 738 711"/>
  </circle>
  <circle r="5" fill="#7c3aed" class="pulse" cx="600" cy="295"/>
  <circle r="5" fill="#2563eb" class="pulse2" cx="232" cy="532"/>
  <circle r="5" fill="#059669" class="pulse3" cx="968" cy="652"/>
  </g>
</svg>
